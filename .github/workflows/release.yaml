name: Release

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

permissions:
  contents: write
  id-token: write

jobs:
  on-success:
    runs-on: ubuntu-latest
    # Condition 1: The build job must have succeeded
    # Condition 2: The event that started the build must have been a tag
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    
    environment:
      name: pypi
      url: https://pypi.org/p/avalanchers

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          # Use the commit that triggered the build workflow
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: release_assets
          pattern: artifacts-*
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: release_assets/**/*
          generate_release_notes: true
          
      - run: |
          mkdir wheels_only
          cp release_assets/*.whl wheels_only/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels_only/
          print-hash: true
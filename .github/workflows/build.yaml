name: Rust CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build all 3 on release tags; only Ubuntu on standard push/PR
        os: >-
          ${{ startsWith(github.ref, 'refs/tags/v')
            && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]')
            || fromJSON('["ubuntu-latest"]')
          }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install Graphics Stack (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        env:
          # Force the use of the Software Rasterizer
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1-mesa-dev \
            libgl1-mesa-dri \
            libxcb-xfixes0-dev \
            mesa-vulkan-drivers \
            libvulkan-dev \
            vulkan-tools

      - name: Verify Software GPU
        if: matrix.os == 'ubuntu-latest'
        env:
          # Tell Vulkan to look in the standard ICD directory
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: |
          # If the first path failed, let's find where it actually is:
          ls /usr/share/vulkan/icd.d/
          vulkaninfo --summary

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends llvm-dev libclang-dev python3-dev

      - name: Check & Test
        env:
            # This forces wgpu to use the software adapter
            WGPU_BACKEND: vulkan 
            VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: |
          cargo fmt --check
          cargo clippy -q -- -D warnings
          cargo test -q
  
      # --- COVERAGE (Ubuntu Only) ---
      - name: Install Tarpaulin
        if: matrix.os == 'ubuntu-latest' 
        # && github.event_name == 'pull_request'
        # Using a binary install is much faster than 'cargo install'
        run: |
          curl -s https://api.github.com/repos/xd009642/tarpaulin/releases/latest \
          | grep "browser_download_url.*x86_64-unknown-linux-musl.tar.gz" \
          | cut -d : -f 2,3 \
          | tr -d \" \
          | wget -qi -
          tar -xzf cargo-tarpaulin-*.tar.gz
          mv cargo-tarpaulin ~/.cargo/bin/

      - name: Run Coverage & Tests (Ubuntu)
        if: matrix.os == 'ubuntu-latest' 
        # && github.event_name == 'pull_request'
        env:
          # This forces wgpu to use the software adapter
          WGPU_BACKEND: vulkan 
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: |
          sudo apt-get install -y python3-dev
          cargo tarpaulin \
            --out html --out lcov --out xml \
            --output-dir coverage_report \
            --run-types Tests \
            --verbose \
            --skip-clean \
            --fail-under 70 \
            -p compute_core -p data_processor

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v1.0.2
        with:
          token: ${{secrets.CODECOV_TOKEN}}

      - name: Upload Coverage Results
        if: matrix.os == 'ubuntu-latest' 
        # && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: code-coverage-report
          path: coverage_report/



      - name: Install wasm-pack
        if: matrix.os == 'ubuntu-latest'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
        # The core binder (This is the most active part of the org)
        # cargo install wasm-bindgen-cli

        # The optimization engine (Faster than the one built into wasm-pack)
        # cargo install wasm-opt

        # The metadata/component tool
        # cargo install wasm-tools
      # --- ARTIFACT GENERATION ---

      - name: Build CLI Binary
        run: cargo build -p cli --release

      - name: Prepare CLI Artifacts
        shell: bash
        run: |
          mkdir -p bin_dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/*.exe bin_dist/
          else
            # Find the binary (assuming it's named after your project) 
            # and rename it to include the OS for clarity in the release
            cp target/release/cli bin_dist/avalanchers-cli-${{ matrix.os }} || true
          fi

      - name: Build Python Wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --find-interpreter

          
      - name: Build WASM (Ubuntu Only)
        if: matrix.os == 'ubuntu-latest'
        run: wasm-pack build crates/wasm_bindings --target web --release --out-dir wasm_dist
            # 1. Compile to wasm
            # cargo build --target wasm32-unknown-unknown --release

            # 2. Generate JS glue (The wasm-bindgen step)
            # wasm-bindgen ./target/wasm32-unknown-unknown/release/avalanchers.wasm --out-dir ./pkg --target web

            # 3. Optimize (The wasm-opt step)
            # wasm-opt -Oz ./pkg/avalanchers_bg.wasm -o ./pkg/avalanchers_bg.wasm

      # --- UPLOAD ---
      - name: Prepare Artifacts for Upload
        # This works on both Linux and Windows (using Git Bash on the runner)
        run: |
          mkdir -p staging_all
          mkdir -p staging_all/wasm
          cp -r dist/*.whl staging_all/ 2>/dev/null || true
          cp -r bin_dist/* staging_all/ 2>/dev/null || true
          cp -r crates/wasm_bindings/wasm_dist/*.wasm staging_all/wasm 2>/dev/null || true
          cp -r crates/wasm_bindings/wasm_dist/*.js staging_all/wasm 2>/dev/null || true

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{ matrix.os }}
          path: staging_all/
          if-no-files-found: warn
          retention-days: 3

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          pattern: artifacts-*
          merge-multiple: true

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/**/*
          generate_release_notes: true
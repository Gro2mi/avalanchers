name: Rust CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        # Build all 3 on release tags; only Ubuntu on standard push/PR
        os: >-
          ${{ startsWith(github.ref, 'refs/tags/v')
            && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]')
            || fromJSON('["ubuntu-latest"]')
          }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install Graphics Stack (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        env:
          # Force the use of the Software Rasterizer
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1-mesa-dev \
            libgl1-mesa-dri \
            libxcb-xfixes0-dev \
            mesa-vulkan-drivers \
            libvulkan-dev \
            vulkan-tools

      - name: Verify Software GPU
        if: matrix.os == 'ubuntu-latest'
        env:
          # Tell Vulkan to look in the standard ICD directory
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: |
          # If the first path failed, let's find where it actually is:
          ls /usr/share/vulkan/icd.d/
          vulkaninfo --summary
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install wasm-pack
        if: matrix.os == 'ubuntu-latest'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq llvm-dev libclang-dev

      - name: Check & Test
        env:
            # This forces wgpu to use the software adapter
            WGPU_BACKEND: vulkan 
            VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: |
          cargo fmt --check
          cargo clippy -q -- -D warnings
          cargo test -q

      # --- COVERAGE (Ubuntu Only) ---
      - name: Install Tarpaulin
        if: matrix.os == 'ubuntu-latest'
        # Using a binary install is much faster than 'cargo install'
        run: |
          curl -s https://api.github.com/repos/xd009642/tarpaulin/releases/latest \
          | grep "browser_download_url.*x86_64-unknown-linux-musl.tar.gz" \
          | cut -d : -f 2,3 \
          | tr -d \" \
          | wget -qi -
          tar -xzf cargo-tarpaulin-*.tar.gz
          mv cargo-tarpaulin ~/.cargo/bin/

      - name: Run Coverage & Tests (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        env:
          # This forces wgpu to use the software adapter
          WGPU_BACKEND: vulkan 
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: |
          cargo tarpaulin \
            --out html --out lcov \
            --output-dir coverage_report \
            --run-types Tests \
            --verbose \
            --skip-clean

      - name: Upload Coverage Results
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage_report/

      # --- ARTIFACT GENERATION ---

      - name: Build CLI Binary
        run: cargo build --release

      - name: Prepare CLI Artifacts
        shell: bash
        run: |
          mkdir -p bin_dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/*.exe bin_dist/
          else
            # Find the binary (assuming it's named after your project) 
            # and rename it to include the OS for clarity in the release
            cp target/release/${{ github.event.repository.name }} bin_dist/${{ github.event.repository.name }}-${{ matrix.os }} || true
          fi

      - name: Build Python Wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --find-interpreter

      - name: Build WASM (Ubuntu Only)
        if: matrix.os == 'ubuntu-latest'
        run: wasm-pack build --release --out-dir wasm_dist

      # --- UPLOAD ---

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            dist/*.whl
            bin_dist/*
            wasm_dist/*.wasm
            wasm_dist/*.js

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          pattern: artifacts-*
          merge-multiple: true

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/**/*
          generate_release_notes: true
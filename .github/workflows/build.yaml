name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable  # or "1.88.0", etc.
          override: true

    #   - name: Install wasm32 target
    #     run: rustup target add wasm32-unknown-unknown
      - name: Build
        run: cargo build --verbose


      - name: Run tests
        run: cargo test --verbose

      - name: Clippy (linter)
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt -- --check


name: Deploy to GitHub Pages

permissions:
  contents: write

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if the Build workflow actually succeeded
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-ubuntu-latest
          path: ./downloaded_assets
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy files with excludes and merge artifacts
        run: |
          mkdir -p deploy_dir
          # Sync frontend source
          rsync -av --exclude='*.pem' --exclude='.*py' --exclude='*.rp' --exclude='*.gpx' --exclude='data/' frontend/ deploy_dir/

          # Ensure the target directory exists before copying
          mkdir -p deploy_dir/frontend/js/pkg/

          # Move the .wasm and .js from the build job into the deployment folder
          find ./downloaded_assets -name "*.wasm" -exec cp {} deploy_dir/frontend/js/pkg/ \;
          find ./downloaded_assets -name "*.js" -exec cp {} deploy_dir/frontend/js/pkg/ \;

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_dir